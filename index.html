    let currentQ = 0;
    let scores = {};
    let shareCount = 128493 + Math.floor(Math.random() * 500);

    function startTest() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
      showQuestion(0);
    }

    function showQuestion(idx) {
      const q = questions[idx];
      document.getElementById('questionNum').textContent = 'QUESTION ' + String(idx + 1).padStart(2, '0');
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('progressText').textContent = `第 ${idx + 1} 题 / 共 ${questions.length} 题`;
      const pct = Math.round((idx / questions.length) * 100);
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt.text}</span>`;
        div.onclick = () => selectOption(opt, div);
        container.appendChild(div);
      });

      // Show mid ad at Q5
      const midAd = document.getElementById('midAd');
      if (idx === 4) {
        midAd.classList.remove('hidden');
      } else {
        midAd.classList.add('hidden');
      }

      document.getElementById('questionCard').style.animation = 'none';
      requestAnimationFrame(() => {
        document.getElementById('questionCard').style.animation = 'fadeIn 0.4s ease';
      });
    }

    function selectOption(opt, el) {
      // Add scores
      for (const [color, pts] of Object.entries(opt.colors)) {
        scores[color] = (scores[color] || 0) + pts;
      }
      el.classList.add('selected');
      setTimeout(() => {
        currentQ++;
        if (currentQ < questions.length) {
          showQuestion(currentQ);
        } else {
          showResult();
        }
      }, 300);
    }

    function showResult() {
      document.getElementById('quizScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      // Find top color
      let topColor = 'violet';
      let topScore = 0;
      for (const [color, score] of Object.entries(scores)) {
        if (score > topScore) { topScore = score; topColor = color; }
      }

      const result = colorResults[topColor];
      const orb = document.getElementById('resultOrb');
      orb.style.background = result.bg;
      orb.style.setProperty('--orb-color', result.orbColor);
      orb.textContent = result.emoji;

      document.getElementById('resultColorName').textContent = result.name;
      document.getElementById('resultColorName').style.background = result.bg;
      document.getElementById('resultColorName').style.webkitBackgroundClip = 'text';
      document.getElementById('resultColorName').style.webkitTextFillColor = 'transparent';
      document.getElementById('resultColorName').style.backgroundClip = 'text';

      document.getElementById('resultSubtitle').textContent = result.subtitle;
      document.getElementById('resultDesc').textContent = result.desc;

      const traitsEl = document.getElementById('resultTraits');
      traitsEl.innerHTML = result.traits.map(t => `<span class="trait">${t}</span>`).join('');

      document.getElementById('shareCount').textContent = shareCount.toLocaleString();
    }

    function shareResult() {
      const colorName = document.getElementById('resultColorName').textContent;
      const text = '我的灵魂颜色是「' + colorName + '」✨ 快来测测你的灵魂颜色！\nhttps://soulcolor.online';
      
      // 优先尝试微信内置浏览器分享
      if (typeof WeixinJSBridge !== 'undefined' && WeixinJSBridge.invoke) {
        WeixinJSBridge.invoke('shareMessage', {
          title: '灵魂颜色测试',
          desc: text,
          link: 'https://soulcolor.online',
          imgUrl: 'https://soulcolor.online/og.png'
        });
        return;
      }
      
      // 尝试 Web Share API（iOS Safari 等）
      if (navigator.share) {
        navigator.share({ title: '灵魂颜色测试', text: text, url: 'https://soulcolor.online' })
          .catch(function() { fallbackCopy(text); });
        return;
      }
      
      // 降级：复制到剪贴板
      fallbackCopy(text);
    }

    function fallbackCopy(text) {
      // textarea 方式，兼容性最好（微信/安卓/iOS均可）
      var ta = document.createElement('textarea');
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      ta.value = text;
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        showShareToast();
      } catch (e) {
        // 兜底：尝试 clipboard API
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(function() {
            showShareToast();
          }).catch(function() {
            showShareFail();
          });
        } else {
          showShareFail();
        }
      }
      document.body.removeChild(ta);
    }

    function showShareToast() {
      var toast = document.getElementById('shareToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'shareToast';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:16px 32px;border-radius:12px;font-size:15px;z-index:99999;transition:opacity 0.3s;';
        document.body.appendChild(toast);
      }
      toast.textContent = '✅ 已复制链接，快去粘贴分享吧！';
      toast.style.opacity = '1';
      clearTimeout(window._shareToastTimer);
      window._shareToastTimer = setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.style.display = 'none'; }, 300);
      }, 2500);
    }

    function showShareFail() {
      var toast = document.getElementById('shareToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'shareToast';
        document.body.appendChild(toast);
      }
      toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:16px 32px;border-radius:12px;font-size:15px;z-index:99999;';
      toast.textContent = '长按复制：https://soulcolor.online';
      toast.style.opacity = '1';
    }

    function restartTest() {
      currentQ = 0; scores = {};
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
    }
  </script>
